<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker - Track Your Expenses</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        success: '#22c55e',
                        danger: '#ef4444',
                        dark: '#0f0f0f',
                        surface: '#1a1a1a'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="app">
        <header class="bg-surface border-b border-white/10 p-4">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold">Budget Tracker</h1>
                <button @click="showAddModal = true" class="bg-primary px-4 py-2 rounded-xl">+ Add Transaction</button>
            </div>
        </header>

        <main class="max-w-4xl mx-auto p-4">
            <!-- Balance Cards -->
            <div class="grid grid-cols-3 gap-4 mb-8">
                <div class="bg-surface rounded-xl p-4">
                    <div class="text-gray-400 text-sm">Income</div>
                    <div class="text-2xl font-bold text-success">+${{ totalIncome }}</div>
                </div>
                <div class="bg-surface rounded-xl p-4">
                    <div class="text-gray-400 text-sm">Expenses</div>
                    <div class="text-2xl font-bold text-danger">-${{ totalExpenses }}</div>
                </div>
                <div class="bg-surface rounded-xl p-4">
                    <div class="text-gray-400 text-sm">Balance</div>
                    <div class="text-2xl font-bold" :class="balance >= 0 ? 'text-success' : 'text-danger'">${{ balance }}</div>
                </div>
            </div>

            <!-- Transactions -->
            <div class="bg-surface rounded-xl p-4">
                <h2 class="font-bold mb-4">Recent Transactions</h2>
                <div v-for="t in transactions" :key="t.id" class="flex justify-between items-center py-3 border-b border-white/10">
                    <div>
                        <div class="font-medium">{{ t.description }}</div>
                        <div class="text-sm text-gray-400">{{ t.category }} • {{ formatDate(t.date) }}</div>
                    </div>
                    <div :class="t.type === 'income' ? 'text-success' : 'text-danger'" class="font-bold">
                        {{ t.type === 'income' ? '+' : '-' }}${{ t.amount }}
                    </div>
                </div>
                <div v-if="transactions.length === 0" class="text-center py-8 text-gray-500">No transactions yet</div>
            </div>
        </main>

        <!-- Add Modal -->
        <div v-if="showAddModal" class="fixed inset-0 bg-black/60 flex items-center justify-center p-4">
            <div class="bg-surface rounded-2xl p-6 w-full max-w-md">
                <h2 class="text-xl font-bold mb-4">Add Transaction</h2>
                <form @submit.prevent="addTransaction" class="space-y-4">
                    <select v-model="form.type" class="w-full bg-dark border border-white/10 rounded-xl px-4 py-3">
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                    </select>
                    <input v-model="form.description" type="text" placeholder="Description" class="w-full bg-dark border border-white/10 rounded-xl px-4 py-3" required>
                    <input v-model.number="form.amount" type="number" placeholder="Amount" class="w-full bg-dark border border-white/10 rounded-xl px-4 py-3" required>
                    <select v-model="form.category" class="w-full bg-dark border border-white/10 rounded-xl px-4 py-3">
                        <option v-for="c in categories" :key="c">{{ c }}</option>
                    </select>
                    <input v-model="form.date" type="date" class="w-full bg-dark border border-white/10 rounded-xl px-4 py-3">
                    <div class="flex gap-4">
                        <button type="button" @click="showAddModal = false" class="flex-1 bg-dark py-3 rounded-xl">Cancel</button>
                        <button type="submit" class="flex-1 bg-primary py-3 rounded-xl font-medium">Add</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const transactions = ref([]);
                const showAddModal = ref(false);
                const categories = ['Food', 'Transport', 'Shopping', 'Bills', 'Entertainment', 'Health', 'Salary', 'Investment', 'Other'];
                const form = ref({ type: 'expense', description: '', amount: '', category: 'Food', date: new Date().toISOString().split('T')[0] });

                const totalIncome = computed(() => transactions.value.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0));
                const totalExpenses = computed(() => transactions.value.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0));
                const balance = computed(() => totalIncome.value - totalExpenses.value);

                const loadData = () => { transactions.value = JSON.parse(localStorage.getItem('transactions') || '[]'); };
                const saveData = () => { localStorage.setItem('transactions', JSON.stringify(transactions.value)); };
                const addTransaction = () => {
                    transactions.value.unshift({ id: Date.now(), ...form.value });
                    saveData();
                    showAddModal.value = false;
                    form.value = { type: 'expense', description: '', amount: '', category: 'Food', date: new Date().toISOString().split('T')[0] };
                };
                const formatDate = (d) => new Date(d).toLocaleDateString();

                onMounted(loadData);
                return { transactions, showAddModal, form, categories, totalIncome, totalExpenses, balance, addTransaction, formatDate };
            }
        }).mount('#app');
    </script>
</body>
</html>
